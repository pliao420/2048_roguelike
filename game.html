<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>2048 Roguelike</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#game-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 16px;
  max-width: 500px;
  width: 100%;
}
#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  gap: 8px;
  flex-wrap: wrap;
}
#title {
  font-size: 24px;
  font-weight: 900;
  color: #edc22e;
  letter-spacing: 2px;
  text-shadow: 0 0 20px rgba(237,194,46,0.3);
}
#header-right { display:flex; gap:8px; align-items:center; }
#reset-btn {
  background: #0f3460;
  color: #53d8fb;
  border: 1px solid #0f3460;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
#reset-btn:active { transform: scale(0.95); }
#lb-btn {
  background: #16213e;
  color: #edc22e;
  border: 1px solid #edc22e44;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
#lb-btn:active { transform: scale(0.95); }
#name-input {
  background: #16213e;
  border: 2px solid #53d8fb;
  border-radius: 10px;
  color: #e2e8f0;
  font-size: 18px;
  padding: 10px 16px;
  width: 100%;
  max-width: 260px;
  text-align: center;
  outline: none;
  margin: 8px 0;
}
#name-input::placeholder { color: #7b8ab4; }
.leaderboard-table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
}
.leaderboard-table th {
  color: #7b8ab4;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 6px 8px;
  border-bottom: 1px solid #0f3460;
}
.leaderboard-table td {
  color: #e2e8f0;
  font-size: 14px;
  padding: 8px;
  border-bottom: 1px solid #0f346022;
}
.leaderboard-table .rank { color: #edc22e; font-weight: 700; width: 30px; }
.leaderboard-table .lb-name { text-align: left; }
.leaderboard-table .lb-score { color: #e94560; font-weight: 700; text-align: right; }
.leaderboard-table .lb-info { color: #7b8ab4; font-size: 12px; text-align: right; }
.lb-empty { color: #7b8ab4; font-size: 13px; padding: 16px; text-align: center; }
#score-box {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 8px 16px;
  text-align: center;
  min-width: 80px;
}
#score-label { font-size: 11px; color: #7b8ab4; text-transform: uppercase; letter-spacing: 1px; }
#score-value { font-size: 24px; font-weight: 700; color: #e94560; }
#move-count { font-size: 12px; color: #7b8ab4; }
#buffs-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  width: 100%;
  min-height: 28px;
}
.buff-tag {
  background: #0f3460;
  color: #53d8fb;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid #53d8fb44;
  white-space: nowrap;
}
canvas {
  border-radius: 12px;
  background: #16213e;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  touch-action: none;
}
#overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 10;
}
#overlay.active { display: flex; }
#popup {
  background: #1a1a2e;
  border: 2px solid #0f3460;
  border-radius: 16px;
  padding: 24px;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 16px 48px rgba(0,0,0,0.8);
  animation: popIn 0.3s ease-out;
}
@keyframes popIn {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
#popup h2 {
  color: #edc22e;
  font-size: 22px;
  margin-bottom: 6px;
}
#popup .subtitle {
  color: #7b8ab4;
  font-size: 13px;
  margin-bottom: 16px;
}
#popup .cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
#popup .card {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 12px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 12px;
}
#popup .card:active, #popup .card:hover {
  border-color: #53d8fb;
  background: #1a2744;
  transform: scale(1.02);
}
#popup .card-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
#popup .card-info { flex:1; }
#popup .card-name {
  color: #e2e8f0;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 3px;
}
#popup .card-desc {
  color: #7b8ab4;
  font-size: 12px;
  line-height: 1.4;
}
#popup .btn {
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 32px;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 16px;
  transition: all 0.2s;
  letter-spacing: 1px;
}
#popup .btn:active { transform: scale(0.95); }
#popup .btn.secondary {
  background: #0f3460;
  color: #53d8fb;
}
#end-turn-btn {
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: none;
  letter-spacing: 1px;
  transition: all 0.2s;
}
#end-turn-btn.visible { display: block; }
#end-turn-btn:active { transform: scale(0.95); }
#hint-text {
  color: #53d8fb;
  font-size: 13px;
  text-align: center;
  min-height: 20px;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}
</style>
</head>
<body>

<div id="game-container">
  <div id="header">
    <div id="title">2048◈</div>
    <div id="header-right">
      <div id="score-box">
        <div id="score-label">分数</div>
        <div id="score-value">0</div>
      </div>
      <div id="move-count">步数: 0</div>
      <button id="reset-btn" onclick="restartGame()">新游戏</button>
      <button id="lb-btn" onclick="showLeaderboard()">🏆</button>
    </div>
  </div>
  <div id="buffs-bar"></div>
  <canvas id="board"></canvas>
  <div id="hint-text">方向键滑动开始</div>
  <button id="end-turn-btn" onclick="endManualMergeTurn()">结束回合</button>
</div>

<div id="overlay">
  <div id="popup"></div>
</div>

<script>
// ============================================================
// 2048 ROGUELIKE — 完整游戏引擎
// ============================================================

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const scoreValue = document.getElementById('score-value');
const moveCountEl = document.getElementById('move-count');
const buffsBar = document.getElementById('buffs-bar');
const hintText = document.getElementById('hint-text');
const endTurnBtn = document.getElementById('end-turn-btn');
const overlay = document.getElementById('overlay');
const popup = document.getElementById('popup');

// ==================== 常量 ====================
const CELL_SIZE = 80;
const GAP = 8;
const PADDING = 8;
const ANIM_SPEED = 120; // ms per animation frame
const MAX_GRID = 8;

// 经典 2048 配色
const TILE_COLORS = {};
const TILE_TEXT_COLORS = {};
[
  [2,    '#eee4da', '#776e65'],
  [4,    '#ede0c8', '#776e65'],
  [8,    '#f2b179', '#f9f6f2'],
  [16,   '#f59563', '#f9f6f2'],
  [32,   '#f67c5f', '#f9f6f2'],
  [64,   '#f65e3b', '#f9f6f2'],
  [128,  '#edcf72', '#f9f6f2'],
  [256,  '#edcc61', '#f9f6f2'],
  [512,  '#edc850', '#f9f6f2'],
  [1024, '#edc53f', '#f9f6f2'],
  [2048, '#edc22e', '#f9f6f2'],
  [4096, '#3c3a32', '#f9f6f2'],
  [8192, '#3c3a32', '#f9f6f2'],
].forEach(([v, bg, fg]) => { TILE_COLORS[v] = bg; TILE_TEXT_COLORS[v] = fg; });

// ==================== 游戏状态 ====================
let grid = [];
let rows = 4, cols = 4;
let score = 0;
let moveCount = 0;
let activeBuffs = [];
let activeBonuses = [];
let phase = 'buff_select'; // buff_select | playing | animating | merge_select | bonus_select | expand_select | game_over
let spawnedThisTurn = false;
let hasMerged2048ThisTurn = false;
let mergeablePairs = []; // [{r1,c1,r2,c2}] for manual merge mode
let lastDirection = 0; // last move direction for manual merge mode post-move effects
let bombGrid = []; // 2D array: bombGrid[r][c] = true if tile has bomb
let mergeCountThisMove = 0; // tracks merges in current move for combo buff
let milestoneReached = new Set(); // tracks which move-count milestones have triggered
let slideAnims = []; // [{v, fromX, fromY, toX, toY, t}] smooth slide animations
const SLIDE_DURATION = 120; // ms for slide animation // [{r,c,fromX,fromY,toX,toY,progress}]
let newTileSpawn = null; // {r,c,value}
let movingTiles = []; // tiles being animated

// ==================== Buff 定义 ====================
const ALL_BUFFS = [
  {
    id: 'skip_spawn_3',
    name: '跳跃生成',
    desc: '每第 3 次移动不会生成新的数字块',
    icon: '⏭️',
    color: '#53d8fb',
  },
  {
    id: 'manual_merge',
    name: '手动合成',
    desc: '移动后数字块不会自动合成，需手动点击相邻相同数字块来合成',
    icon: '👆',
    color: '#f9ca24',
  },
  {
    id: 'lucky_spawn',
    name: '幸运生成',
    desc: '生成新数字块时，有 40% 概率生成 4、20% 概率生成 8',
    icon: '🍀',
    color: '#6ab04c',
  },
  {
    id: 'big_start',
    name: '强势开局',
    desc: '初始棋盘预置一个 512 和一个 256，快速冲向高分段',
    icon: '🚀',
    color: '#e94560',
  },
  {
    id: 'score_boost',
    name: '分数加成',
    desc: '每次合成获得的分数 +20%',
    icon: '⭐',
    color: '#edc22e',
  },
  {
    id: 'second_chance',
    name: '复活机会',
    desc: '游戏结束时自动清空棋盘上最小的一半数字块，仅生效一次',
    icon: '💫',
    color: '#be2edd',
  },
  {
    id: 'bomb_tile',
    name: '炸弹数字',
    desc: '5% 概率生成炸弹方块，点击炸弹引爆清除周围 3×3 所有数字并获得分数',
    icon: '💣',
    color: '#ff4757',
  },
  {
    id: 'magnet',
    name: '磁力吸附',
    desc: '每次移动后，相邻相同数字额外自动合并一次',
    icon: '🧲',
    color: '#7bed9f',
  },
  {
    id: 'airdrop',
    name: '空降支援',
    desc: '每 10 步在随机空格生成一个 64',
    icon: '🪂',
    color: '#74b9ff',
  },
  {
    id: 'combo',
    name: '连击奖励',
    desc: '单次移动合并多个数字时，每个额外合并 +30% 分数',
    icon: '🔥',
    color: '#e17055',
  },
];

// ==================== 加成定义（合成 2048 触发） ====================
const ALL_BONUSES = [
  {
    id: 'super_2',
    name: '超级·2',
    desc: '两个 2 合成时变为 8（而非 4）',
    icon: '2→8',
    color: '#f9ca24',
    targetNumber: 2,
    apply(result) { return 8; } // merge two 2s → 8
  },
  {
    id: 'super_4',
    name: '超级·4',
    desc: '两个 4 合成时变为 16（而非 8）',
    icon: '4→16',
    color: '#f0932b',
    targetNumber: 4,
    apply(result) { return 16; } // merge two 4s → 16
  },
  {
    id: 'split_master',
    name: '分裂大师',
    desc: '点击任意数字块可将其分裂为两个一半的数字（需相邻空位）',
    icon: '✂️',
    color: '#a29bfe',
    splitEnabled: true,
  },
  {
    id: 'chain_reaction',
    name: '连锁反应',
    desc: '合成后，在合成位置随机相邻空格额外生成一个相同数字',
    icon: '💥',
    color: '#fd79a8',
    chainEnabled: true,
  },
  {
    id: 'double_trouble',
    name: '双重打击',
    desc: '合成 8 及以上的数字时，额外获得该数字一半的分数',
    icon: 'x2',
    color: '#00b894',
    targetNumber: 8,
  },
  {
    id: 'lucky_merge',
    name: '幸运合成',
    desc: '合成时有 25% 概率让合成结果翻倍',
    icon: '🎲',
    color: '#e17055',
    apply(result) { return Math.random() < 0.25 ? result * 2 : result; }
  },
  {
    id: 'clone_walk',
    name: '克隆行走',
    desc: '移动时，所有 2 会向移动方向的相邻空格复制自身',
    icon: '🐾',
    color: '#74b9ff',
    cloneEnabled: true,
  },
  {
    id: 'growing_tile',
    name: '成长方块',
    desc: '棋盘上所有 2 每回合自动变为 4（不会进一步变化）',
    icon: '🌱',
    color: '#55efc4',
  },
];

// ==================== 工具函数 ====================
function randInt(max) { return Math.floor(Math.random() * max); }
function shuffle(arr) { for (let i = arr.length-1; i>0; i--) { const j = randInt(i+1); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
function pickRandom(arr, n) { return shuffle([...arr]).slice(0, n); }

// ==================== 画布大小计算 ====================
function resizeCanvas() {
  const w = cols * CELL_SIZE + (cols + 1) * GAP + PADDING * 2;
  const h = rows * CELL_SIZE + (rows + 1) * GAP + PADDING * 2;
  canvas.width = w;
  canvas.height = h;
  canvas.style.width = Math.min(w, window.innerWidth - 32) + 'px';
  canvas.style.height = Math.min(h, (window.innerHeight - 260) | 0) + 'px';
}

// ==================== 坐标计算 ====================
function cellX(c) { return PADDING + GAP + c * (CELL_SIZE + GAP); }
function cellY(r) { return PADDING + GAP + r * (CELL_SIZE + GAP); }
function cellToRow(y) { return Math.round((y - PADDING - GAP) / (CELL_SIZE + GAP)); }
function cellToCol(x) { return Math.round((x - PADDING - GAP) / (CELL_SIZE + GAP)); }

// ==================== 棋盘逻辑 ====================
function initGrid() {
  grid = [];
  bombGrid = [];
  for (let r = 0; r < rows; r++) {
    grid[r] = new Array(cols).fill(0);
    bombGrid[r] = new Array(cols).fill(false);
  }
}

function getEmptyCells() {
  const cells = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c] === 0) cells.push({r, c});
  return cells;
}

function spawnTile(value) {
  const empty = getEmptyCells();
  if (empty.length === 0) return null;
  const {r, c} = empty[randInt(empty.length)];
  if (!value) {
    if (hasBuff('lucky_spawn')) {
      const roll = Math.random();
      if (roll < 0.20) value = 8;
      else if (roll < 0.60) value = 4;
      else value = 2;
    } else {
      value = Math.random() < 0.9 ? 2 : 4;
    }
  }
  grid[r][c] = value;
  bombGrid[r][c] = hasBuff('bomb_tile') && Math.random() < 0.05;
  newTileSpawn = {r, c, value, time: Date.now()};
  return {r, c, value};
}

function hasBuff(id) { return activeBuffs.some(b => b.id === id); }
function hasBonus(id) { return activeBonuses.some(b => b.id === id); }

function shouldSkipSpawn() {
  if (hasBuff('skip_spawn_3') && moveCount % 3 === 0) return true;
  return false;
}

// ==================== 移动逻辑 ====================
function slideLine(line, bombLine) {
  const filtered = [];
  const filteredBombs = [];
  for (let i = 0; i < line.length; i++) {
    if (line[i] !== 0) {
      filtered.push(line[i]);
      filteredBombs.push(bombLine ? bombLine[i] : false);
    }
  }
  const result = [];
  const bombResult = [];
  let scoreGain = 0;
  let i = 0;
  while (i < filtered.length) {
    if (i + 1 < filtered.length && filtered[i] === filtered[i + 1]) {
      let mergeVal = filtered[i] * 2;
      const mergedBomb = filteredBombs[i] || filteredBombs[i + 1];
      // 应用有针对数字的加成
      for (const bonus of activeBonuses) {
        if (bonus.targetNumber && bonus.targetNumber === filtered[i] && bonus.apply) {
          mergeVal = bonus.apply(mergeVal);
          break;
        }
      }
      // 应用通用加成
      for (const bonus of activeBonuses) {
        if (!bonus.targetNumber && bonus.apply) {
          mergeVal = bonus.apply(mergeVal);
          break;
        }
      }
      result.push(mergeVal);
      bombResult.push(mergedBomb);
      scoreGain += mergeVal;
      mergeCountThisMove++;
      if (mergeVal >= 8) {
        for (const bonus of activeBonuses) {
          if (bonus.id === 'double_trouble') scoreGain += Math.floor(mergeVal / 2);
        }
      }
      if (mergeVal === 2048) hasMerged2048ThisTurn = true;
      i += 2;
    } else {
      result.push(filtered[i]);
      bombResult.push(filteredBombs[i]);
      i++;
    }
  }
  while (result.length < line.length) {
    result.push(0);
    bombResult.push(false);
  }
  return { result, scoreGain, bombResult };
}

function slideLineNoMerge(line) {
  // 只滑动不合并
  const filtered = line.filter(v => v !== 0);
  while (filtered.length < line.length) filtered.push(0);
  return { result: filtered, pairs: [] };
}

function findMergeablePairs(line) {
  const pairs = [];
  for (let i = 0; i < line.length - 1; i++) {
    if (line[i] !== 0 && line[i] === line[i + 1]) {
      pairs.push({ idx1: i, idx2: i + 1, value: line[i] });
    }
  }
  return pairs;
}

function moveGrid(direction) {
  // direction: 0=up, 1=right, 2=down, 3=left
  // 如果动画还在播放，跳过
  if (slideAnims.length > 0) return { changed: false, totalScore: 0 };

  lastDirection = direction;
  const oldGrid = grid.map(r => [...r]);
  const oldBombGrid = bombGrid.map(r => [...r]);
  let totalScore = 0;
  mergeCountThisMove = 0;
  mergeablePairs = [];
  hasMerged2048ThisTurn = false;

  if (hasBuff('manual_merge')) {
    // 手动合成模式：只滑动不合并（炸弹随滑块移动）
    if (direction === 0 || direction === 2) {
      for (let c = 0; c < cols; c++) {
        let line = [], bLine = [];
        for (let r = 0; r < rows; r++) { line.push(grid[r][c]); bLine.push(bombGrid[r][c]); }
        if (direction === 2) { line.reverse(); bLine.reverse(); }
        const { result } = slideLineNoMerge(line);
        if (direction === 2) result.reverse();
        // 炸弹跟着移动
        const bResult = slideBombsNoMerge(line, bLine, direction);
        for (let r = 0; r < rows; r++) { grid[r][c] = result[r]; bombGrid[r][c] = bResult[r]; }
        if (direction === 2) result.reverse();
        const pairs = findMergeablePairs(result);
        for (const p of pairs) {
          const r1 = direction === 0 ? p.idx1 : rows - 1 - p.idx1;
          const r2 = direction === 0 ? p.idx2 : rows - 1 - p.idx2;
          mergeablePairs.push({ r1, c1: c, r2, c2: c, value: p.value });
        }
      }
    } else {
      for (let r = 0; r < rows; r++) {
        let line = [...grid[r]], bLine = [...bombGrid[r]];
        if (direction === 1) { line.reverse(); bLine.reverse(); }
        const { result } = slideLineNoMerge(line);
        if (direction === 1) result.reverse();
        const bResult = slideBombsNoMerge(line, bLine, direction);
        grid[r] = result; bombGrid[r] = bResult;
        if (direction === 1) result.reverse();
        const pairs = findMergeablePairs(result);
        for (const p of pairs) {
          const c1 = direction === 3 ? p.idx1 : cols - 1 - p.idx1;
          const c2 = direction === 3 ? p.idx2 : cols - 1 - p.idx2;
          mergeablePairs.push({ r1: r, c1, r2: r, c2, value: p.value });
        }
      }
    }
  } else {
    // 自动合成模式（炸弹随合成继承）
    if (direction === 0 || direction === 2) {
      for (let c = 0; c < cols; c++) {
        let line = [], bLine = [];
        for (let r = 0; r < rows; r++) { line.push(grid[r][c]); bLine.push(bombGrid[r][c]); }
        if (direction === 2) { line.reverse(); bLine.reverse(); }
        const { result, scoreGain, bombResult } = slideLine(line, bLine);
        if (direction === 2) { result.reverse(); bombResult.reverse(); }
        for (let r = 0; r < rows; r++) { grid[r][c] = result[r]; bombGrid[r][c] = bombResult[r]; }
        totalScore += scoreGain;
      }
    } else {
      for (let r = 0; r < rows; r++) {
        let line = [...grid[r]], bLine = [...bombGrid[r]];
        if (direction === 1) { line.reverse(); bLine.reverse(); }
        const { result, scoreGain, bombResult } = slideLine(line, bLine);
        if (direction === 1) { result.reverse(); bombResult.reverse(); }
        grid[r] = result; bombGrid[r] = bombResult;
        totalScore += scoreGain;
      }
    }
  }

  // 磁力吸附：再次扫描，相邻相同数字自动合并一次
  if (!hasBuff('manual_merge') && hasBuff('magnet')) {
    totalScore += applyMagnet();
  }

  // 检查是否有变化
  let changed = false;
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c] !== oldGrid[r][c]) changed = true;

  if (changed) {
    // 生成滑动动画
    slideAnims = buildSlideAnims(oldGrid, grid);

    // 连击奖励：多个合并额外加分
    if (hasBuff('combo') && mergeCountThisMove > 1) {
      totalScore += Math.floor(totalScore * 0.3 * (mergeCountThisMove - 1));
    }
    if (hasBuff('score_boost')) totalScore = Math.floor(totalScore * 1.2);
    score += totalScore;
    moveCount++;

    if (hasBuff('manual_merge') && mergeablePairs.length > 0) {
      phase = 'merge_select';
      hintText.textContent = '点击高亮的数字对来合成';
      endTurnBtn.classList.add('visible');
    } else if (!shouldSkipSpawn()) {
      spawnTile();
      phase = 'playing';
    } else {
      phase = 'playing';
    }
  }

  // 空降支援：每10步生成一个64
  if (changed && hasBuff('airdrop') && moveCount % 10 === 0) {
    const empty = getEmptyCells();
    if (empty.length > 0) {
      const pos = empty[randInt(empty.length)];
      grid[pos.r][pos.c] = 64;
      bombGrid[pos.r][pos.c] = hasBuff('bomb_tile') && Math.random() < 0.05;
    }
  }

  // 自动合成模式下应用 growing_tile 和 clone_walk
  if (changed && !hasBuff('manual_merge')) {
    applyPostMoveBonuses(direction);
  }

  // 里程碑检查：每100步触发一次 Buff 选择
  if (changed && moveCount > 0 && moveCount % 100 === 0 && !milestoneReached.has(moveCount)) {
    milestoneReached.add(moveCount);
    showMilestoneBuffSelect();
  }

  return { changed, totalScore };
}

// 手动模式下炸弹跟随滑块移动（不合并）
function slideBombsNoMerge(line, bombLine, direction) {
  const filtered = [];
  const filteredBombs = [];
  for (let i = 0; i < line.length; i++) {
    if (line[i] !== 0) { filtered.push(line[i]); filteredBombs.push(bombLine[i]); }
  }
  while (filtered.length < line.length) { filtered.push(0); filteredBombs.push(false); }
  const result = direction === 1 ? filtered.reverse() : filtered;
  const bResult = direction === 1 ? filteredBombs.reverse() : filteredBombs;
  if (direction === 2 || direction === 1) { result.reverse(); bResult.reverse(); }
  return bResult;
}

// 构建滑动动画数据（比较新旧棋盘，匹配移动/合并的方块）
function buildSlideAnims(oldGrid, newGrid) {
  const anims = [];
  const usedOld = new Set();

  // 第一遍：精确匹配（方块仅滑动，未合并）
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (newGrid[r][c] === 0) continue;
      const v = newGrid[r][c];
      for (let or2 = 0; or2 < rows; or2++) {
        for (let oc = 0; oc < cols; oc++) {
          const key = `${or2},${oc}`;
          if (oldGrid[or2][oc] === v && !usedOld.has(key)) {
            if (or2 !== r || oc !== c) {
              anims.push({ v, fromX: cellX(oc), fromY: cellY(or2), toX: cellX(c), toY: cellY(r), t: 0 });
            }
            usedOld.add(key);
            or2 = rows; break; // break outer loop
          }
        }
      }
    }
  }

  // 第二遍：合并匹配（新方块值 = 旧方块值的2倍）
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (newGrid[r][c] === 0) continue;
      if (anims.some(a => a.toX === cellX(c) && a.toY === cellY(r))) continue;
      const v = newGrid[r][c];
      for (let or2 = 0; or2 < rows; or2++) {
        for (let oc = 0; oc < cols; oc++) {
          const key = `${or2},${oc}`;
          if (oldGrid[or2][oc] === v / 2 && !usedOld.has(key)) {
            anims.push({ v, fromX: cellX(oc), fromY: cellY(or2), toX: cellX(c), toY: cellY(r), t: 0 });
            usedOld.add(key);
            or2 = rows; break;
          }
        }
      }
    }
  }

  return anims;
}

// 磁力吸附：扫描全棋盘，相邻相同数字合并
function applyMagnet() {
  let gain = 0;
  let merged;
  do {
    merged = false;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c] === 0) continue;
        // 检查右边
        if (c + 1 < cols && grid[r][c] === grid[r][c + 1]) {
          let mv = grid[r][c] * 2;
          for (const bonus of activeBonuses) {
            if (bonus.targetNumber && bonus.targetNumber === grid[r][c] && bonus.apply) { mv = bonus.apply(mv); break; }
            if (!bonus.targetNumber && bonus.apply) { mv = bonus.apply(mv); break; }
          }
          bombGrid[r][c + 1] = bombGrid[r][c] || bombGrid[r][c + 1];
          bombGrid[r][c] = false;
          grid[r][c + 1] = mv;
          grid[r][c] = 0;
          gain += mv;
          if (mv === 2048) hasMerged2048ThisTurn = true;
          merged = true;
        }
        // 检查下边
        if (r + 1 < rows && grid[r][c] === grid[r + 1][c]) {
          let mv = grid[r][c] * 2;
          for (const bonus of activeBonuses) {
            if (bonus.targetNumber && bonus.targetNumber === grid[r][c] && bonus.apply) { mv = bonus.apply(mv); break; }
            if (!bonus.targetNumber && bonus.apply) { mv = bonus.apply(mv); break; }
          }
          bombGrid[r + 1][c] = bombGrid[r][c] || bombGrid[r + 1][c];
          bombGrid[r][c] = false;
          grid[r + 1][c] = mv;
          grid[r][c] = 0;
          gain += mv;
          if (mv === 2048) hasMerged2048ThisTurn = true;
          merged = true;
        }
      }
    }
  } while (merged);
  return gain;
}

function applyPostMoveBonuses(direction) {
  if (hasBonus('growing_tile')) {
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (grid[r][c] === 2) grid[r][c] = 4;
  }
  if (hasBonus('clone_walk')) {
    const [dr, dc] = [[-1,0],[0,1],[1,0],[0,-1]][direction];
    const clones = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (grid[r][c] === 2) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === 0) {
            clones.push({r: nr, c: nc});
          }
        }
    for (const pos of clones) grid[pos.r][pos.c] = 2;
  }
}

function applyManualMerge(r1, c1, r2, c2) {
  const v = grid[r1][c1];
  let mergeVal = v * 2;

  // 应用有针对数字的加成
  for (const bonus of activeBonuses) {
    if (bonus.targetNumber && bonus.targetNumber === v && bonus.apply) {
      mergeVal = bonus.apply(mergeVal);
      break;
    }
  }
  // 应用通用加成
  for (const bonus of activeBonuses) {
    if (!bonus.targetNumber && bonus.apply) {
      mergeVal = bonus.apply(mergeVal);
      break;
    }
  }

  const mergedBomb = bombGrid[r1][c1] || bombGrid[r2][c2];
  grid[r1][c1] = 0;
  bombGrid[r1][c1] = false;
  grid[r2][c2] = mergeVal;
  bombGrid[r2][c2] = mergedBomb;
  mergeCountThisMove++;
  let gain = mergeVal;
  if (hasBuff('score_boost')) gain = Math.floor(gain * 1.5);
  score += gain;
  if (mergeVal === 2048) hasMerged2048ThisTurn = true;

  // 连锁反应
  if (hasBonus('chain_reaction')) {
    const tr = r2, tc = c2;
    const adj = [];
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = tr + dr, nc = tc + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === 0) {
        adj.push({r: nr, c: nc});
      }
    }
    if (adj.length > 0) {
      const pos = adj[randInt(adj.length)];
      grid[pos.r][pos.c] = mergeVal;
    }
  }

  // 检查新的合并对
  mergeablePairs = findAllMergeablePairs();
  if (mergeablePairs.length === 0) {
    endManualMergeTurn();
  } else {
    render();
    updateUI();
  }
}

function findAllMergeablePairs() {
  const pairs = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] === 0) continue;
      if (c + 1 < cols && grid[r][c] === grid[r][c + 1])
        pairs.push({ r1: r, c1: c, r2: r, c2: c + 1, value: grid[r][c] });
      if (r + 1 < rows && grid[r][c] === grid[r + 1][c])
        pairs.push({ r1: r, c1: c, r2: r + 1, c2: c, value: grid[r][c] });
    }
  }
  return pairs;
}

function endManualMergeTurn() {
  mergeablePairs = [];
  endTurnBtn.classList.remove('visible');
  // 手动合成后应用磁力吸附
  let magnetGain = 0;
  if (hasBuff('magnet')) magnetGain = applyMagnet();
  // 连击奖励
  if (hasBuff('combo') && mergeCountThisMove > 1) {
    const bonusScore = Math.floor((mergeCountThisMove - 1) * 0.3 * 100);
    score += bonusScore;
  }
  if (!shouldSkipSpawn()) {
    spawnTile();
  }
  // 空降支援
  if (hasBuff('airdrop') && moveCount % 10 === 0) {
    const empty = getEmptyCells();
    if (empty.length > 0) {
      const pos = empty[randInt(empty.length)];
      grid[pos.r][pos.c] = 64;
      bombGrid[pos.r][pos.c] = hasBuff('bomb_tile') && Math.random() < 0.05;
    }
  }
  // 手动合成完成后应用加成效果
  applyPostMoveBonuses(lastDirection);
  saveGame();
  // 里程碑检查
  if (moveCount > 0 && moveCount % 100 === 0 && !milestoneReached.has(moveCount)) {
    milestoneReached.add(moveCount);
    showMilestoneBuffSelect();
    return;
  }
  if (hasMerged2048ThisTurn) {
    showBonusSelect();
    return;
  }
  if (checkGameOver()) {
    showGameOver();
    return;
  }
  phase = 'playing';
  hintText.textContent = hasBuff('manual_merge') ? '方向键滑动（手动合成模式）' : '方向键滑动';
  render();
}

// 炸弹引爆：清除 3×3 区域，获得分数
function explodeBomb(r, c) {
  let clearScore = 0;
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      const nr = r + dr, nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] > 0) {
        clearScore += grid[nr][nc];
        grid[nr][nc] = 0;
        bombGrid[nr][nc] = false;
      }
    }
  }
  if (hasBuff('score_boost')) clearScore = Math.floor(clearScore * 1.2);
  score += clearScore;
}

// 分裂功能
function splitTile(r, c) {
  const v = grid[r][c];
  if (v < 4) return false;
  const half = v / 2;
  const adj = [];
  for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
    const nr = r + dr, nc = c + dc;
    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === 0) {
      adj.push({r: nr, c: nc});
    }
  }
  if (adj.length === 0) return false;
  const pos = adj[randInt(adj.length)];
  const hadBomb = bombGrid[r][c];
  grid[r][c] = half;
  grid[pos.r][pos.c] = half;
  bombGrid[r][c] = hadBomb; // 原位置保留炸弹
  bombGrid[pos.r][pos.c] = false;
  return true;
}

// ==================== 游戏结束判定 ====================
function isGameOver() {
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      if (grid[r][c] === 0) return false;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (c + 1 < cols && grid[r][c] === grid[r][c + 1]) return false;
      if (r + 1 < rows && grid[r][c] === grid[r + 1][c]) return false;
    }
  }
  return true;
}

function checkGameOver() {
  if (!isGameOver()) return false;
  if (hasBuff('second_chance') && !activeBuffs.find(b => b.id === 'second_chance').used) {
    // 复活：清空最小的一半数字块
    const tiles = [];
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        if (grid[r][c] > 0) tiles.push({r, c, v: grid[r][c]});
    tiles.sort((a, b) => a.v - b.v);
    const removeCount = Math.floor(tiles.length / 2);
    for (let i = 0; i < removeCount; i++) {
      grid[tiles[i].r][tiles[i].c] = 0;
      bombGrid[tiles[i].r][tiles[i].c] = false;
    }
    activeBuffs.find(b => b.id === 'second_chance').used = true;
    render();
    updateUI();
    return false;
  }
  return true;
}

// ==================== 渲染 ====================
function render() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // 背景网格
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = cellX(c), y = cellY(r);
      ctx.fillStyle = '#0f3460';
      ctx.beginPath();
      roundRect(ctx, x, y, CELL_SIZE, CELL_SIZE, 8);
      ctx.fill();
    }
  }

  // 可合并对高亮
  if (phase === 'merge_select') {
    const time = Date.now();
    const alpha = 0.4 + 0.3 * Math.sin(time / 300);
    for (const pair of mergeablePairs) {
      for (const {r, c} of [{r: pair.r1, c: pair.c1}, {r: pair.r2, c: pair.c2}]) {
        const x = cellX(c), y = cellY(r);
        ctx.fillStyle = `rgba(83, 216, 251, ${alpha})`;
        ctx.beginPath();
        roundRect(ctx, x - 2, y - 2, CELL_SIZE + 4, CELL_SIZE + 4, 10);
        ctx.fill();
      }
    }
  }

  // 数字块
  const now = Date.now();
  // 收集动画目标位置，避免重复绘制
  const animTargets = new Set(slideAnims.map(a => `${cellToRow(a.toY)},${cellToCol(a.toX)}`));
  const animSources = new Set(slideAnims.map(a => `${cellToRow(a.fromY)},${cellToCol(a.fromX)}`));

  // 先绘制动画中的方块（插值位置）
  for (const a of slideAnims) {
    const progress = Math.min(a.t, 1);
    const eased = 1 - Math.pow(1 - progress, 3); // ease-out cubic
    const ax = a.fromX + (a.toX - a.fromX) * eased;
    const ay = a.fromY + (a.toY - a.fromY) * eased;
    const v = a.v;
    const bgColor = TILE_COLORS[v] || '#3c3a32';
    const textColor = TILE_TEXT_COLORS[v] || '#f9f6f2';

    ctx.fillStyle = bgColor;
    ctx.shadowColor = 'rgba(0,0,0,0.3)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    ctx.beginPath();
    roundRect(ctx, ax + 2, ay + 2, CELL_SIZE - 4, CELL_SIZE - 4, 8);
    ctx.fill();
    ctx.shadowColor = 'transparent';

    // 炸弹标记
    const ar = cellToRow(a.toY), ac = cellToCol(a.toX);
    if (bombGrid[ar] && bombGrid[ar][ac]) {
      const pulse = 0.5 + 0.5 * Math.sin(now / 200);
      ctx.strokeStyle = `rgba(255, 71, 87, ${0.5 + pulse * 0.5})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      roundRect(ctx, ax + 1, ay + 1, CELL_SIZE - 2, CELL_SIZE - 2, 9);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.fillStyle = '#ff4757';
      ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('💣', ax + CELL_SIZE - 4, ay + 4);
    }

    ctx.fillStyle = textColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = v < 100 ? 28 : v < 1000 ? 24 : v < 10000 ? 20 : 16;
    ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
    ctx.fillText(v, ax + CELL_SIZE / 2, ay + CELL_SIZE / 2 + 2);
  }

  // 再绘制静态方块（跳过动画目标和动画源位置）
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (grid[r][c] === 0) continue;
      const key = `${r},${c}`;
      if (animTargets.has(key)) continue; // 已被动画绘制
      const v = grid[r][c];
      const x = cellX(c), y = cellY(r);

      const bgColor = TILE_COLORS[v] || '#3c3a32';
      const textColor = TILE_TEXT_COLORS[v] || '#f9f6f2';

      // 绘制数字块
      ctx.fillStyle = bgColor;
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 4;
      ctx.shadowOffsetY = 2;
      ctx.beginPath();
      roundRect(ctx, x + 2, y + 2, CELL_SIZE - 4, CELL_SIZE - 4, 8);
      ctx.fill();
      ctx.shadowColor = 'transparent';

      // 新生成块的标记（红色发光边框，持续 1.5 秒渐隐）
      if (newTileSpawn && newTileSpawn.r === r && newTileSpawn.c === c) {
        const elapsed = now - newTileSpawn.time;
        if (elapsed < 1500) {
          const alpha = 1 - elapsed / 1500;
          ctx.strokeStyle = `rgba(233, 69, 96, ${alpha})`;
          ctx.lineWidth = 3;
          ctx.shadowColor = `rgba(233, 69, 96, ${alpha * 0.6})`;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          roundRect(ctx, x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2, 9);
          ctx.stroke();
          ctx.shadowColor = 'transparent';
          ctx.lineWidth = 1;
        }
      }

      // 炸弹标记：方块右上角显示 💣，红色脉冲边框
      if (bombGrid[r][c]) {
        const pulse = 0.5 + 0.5 * Math.sin(now / 200);
        ctx.strokeStyle = `rgba(255, 71, 87, ${0.5 + pulse * 0.5})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        roundRect(ctx, x + 1, y + 1, CELL_SIZE - 2, CELL_SIZE - 2, 9);
        ctx.stroke();
        ctx.lineWidth = 1;
        ctx.fillStyle = '#ff4757';
        ctx.font = 'bold 13px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText('💣', x + CELL_SIZE - 4, y + 4);
      }

      // 文字
      ctx.fillStyle = textColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const fontSize = v < 100 ? 28 : v < 1000 ? 24 : v < 10000 ? 20 : 16;
      ctx.font = `bold ${fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`;
      ctx.fillText(v, x + CELL_SIZE / 2, y + CELL_SIZE / 2 + 2);
    }
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function updateUI() {
  scoreValue.textContent = score;
  moveCountEl.textContent = `步数: ${moveCount}`;
  buffsBar.innerHTML = activeBuffs.map(b =>
    `<span class="buff-tag">${b.icon} ${b.name}</span>`
  ).join('') + activeBonuses.map(b =>
    `<span class="buff-tag" style="color:#edc22e;border-color:#edc22e44">${b.icon} ${b.name}</span>`
  ).join('');
}

            <div class="card-desc">${b.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  showPopup(html);
}

function selectBuff(id) {
  const buff = ALL_BUFFS.find(b => b.id === id);
  activeBuffs.push({...buff, used: false});
  hidePopup();
  startGame();
}

function showBonusSelect() {
  phase = 'bonus_select';
  const bonuses = pickRandom(ALL_BONUSES, 3);
  const html = `
    <h2>🎉 合成 2048！</h2>
    <div class="subtitle">选择一项数字加成（三选一）</div>
    <div class="cards">
      ${bonuses.map(b => `
        <div class="card" onclick="selectBonus('${b.id}')">
          <div class="card-icon" style="background:${b.color}22;border:2px solid ${b.color}44">${b.icon}</div>
          <div class="card-info">
            <div class="card-name" style="color:${b.color}">${b.name}</div>
            <div class="card-desc">${b.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  showPopup(html);
}

function selectBonus(id) {
  const bonus = ALL_BONUSES.find(b => b.id === id);
  activeBonuses.push({...bonus});
  hidePopup();
  saveGame();
  showExpandSelect();
}

function showExpandSelect() {
  phase = 'expand_select';
  if (rows >= MAX_GRID && cols >= MAX_GRID) {
    phase = 'playing';
    render();
    updateUI();
    return;
  }
  const canExpandRow = rows < MAX_GRID;
  const canExpandCol = cols < MAX_GRID;
  const options = [];
  if (canExpandRow) options.push({ id: 'row', name: '横向扩展', desc: '增加 1 行空行', icon: '⬆️⬇️' });
  if (canExpandCol) options.push({ id: 'col', name: '纵向扩展', desc: '增加 1 列空列', icon: '⬅️➡️' });
  const html = `
    <h2>棋盘扩展</h2>
    <div class="subtitle">选择扩展方向（棋盘上限 8×8）</div>
    <div class="cards">
      ${options.map(o => `
        <div class="card" onclick="selectExpand('${o.id}')">
          <div class="card-icon" style="background:#53d8fb22;border:2px solid #53d8fb44">${o.icon}</div>
          <div class="card-info">
            <div class="card-name">${o.name}</div>
            <div class="card-desc">${o.desc}</div>
          </div>
        </div>
      `).join('')}
      <div class="card" onclick="selectExpand('skip')">
        <div class="card-icon" style="background:#7b8ab422;border:2px solid #7b8ab444">✖️</div>
        <div class="card-info">
          <div class="card-name" style="color:#7b8ab4">暂不扩展</div>
          <div class="card-desc">保持当前棋盘大小继续游戏</div>
        </div>
      </div>
    </div>
  `;
  showPopup(html);
}

function selectExpand(type) {
  if (type === 'row') {
    const insertAt = randInt(rows + 1);
    const newRow = new Array(cols).fill(0);
    const newBombRow = new Array(cols).fill(false);
    grid.splice(insertAt, 0, newRow);
    bombGrid.splice(insertAt, 0, newBombRow);
    rows++;
  } else if (type === 'col') {
    const insertAt = randInt(cols + 1);
    for (let r = 0; r < rows; r++) {
      grid[r].splice(insertAt, 0, 0);
      bombGrid[r].splice(insertAt, 0, false);
    }
    cols++;
  }
  hidePopup();
  resizeCanvas();
  phase = 'playing';
  saveGame();
  render();
  updateUI();
}

function showGameOver() {
  phase = 'game_over';
  clearSave();
  const buffSummary = activeBuffs.map(b=>b.name).join('、') || '无';
  const bonusSummary = activeBonuses.map(b=>b.name).join('、') || '无';
  const html = `
    <h2>游戏结束</h2>
    <div class="subtitle">最终分数: <b style="color:#e94560">${score}</b> | 步数: ${moveCount} | 棋盘: ${rows}×${cols}</div>
    <div class="subtitle" style="margin-top:4px;font-size:11px">Buff: ${buffSummary}</div>
    <div class="subtitle" style="font-size:11px">加成: ${bonusSummary}</div>
    <div class="subtitle" style="margin-top:12px;color:#edc22e">留下你的名字，载入排行榜</div>
    <input id="name-input" type="text" placeholder="输入昵称" maxlength="8" autocomplete="off">
    <div style="display:flex;gap:8px;justify-content:center">
      <button class="btn secondary" onclick="skipLeaderboard()">跳过</button>
      <button class="btn" onclick="submitToLeaderboard()">提交</button>
    </div>
  `;
  showPopup(html);
  setTimeout(() => {
    const inp = document.getElementById('name-input');
    if (inp) inp.focus();
  }, 350);
}

async function submitToLeaderboard() {
  const inp = document.getElementById('name-input');
  const name = (inp && inp.value.trim()) ? inp.value.trim() : '无名玩家';
  await addToLeaderboard(name, score, moveCount, rows, cols);
  hidePopup();
  await showGameOverResult(name);
}

async function skipLeaderboard() {
  hidePopup();
  await showGameOverResult(null);
}

async function showGameOverResult(name) {
  const lb = await getLeaderboard();
  const lbHtml = renderLeaderboardTable(lb, score);
  const msg = name ? `<div class="subtitle" style="color:#53d8fb">「${name}」已载入排行榜</div>` : '';
  const html = `
    <h2>游戏结束</h2>
    ${msg}
    <div class="subtitle">最终分数: <b style="color:#e94560">${score}</b> | 步数: ${moveCount} | 棋盘: ${rows}×${cols}</div>
    <h3 style="color:#edc22e;margin:16px 0 4px;font-size:14px">🏆 排行榜 TOP 10</h3>
    ${lbHtml}
    <button class="btn" onclick="restartGame()">再来一局</button>
  `;
  showPopup(html);
}

// ==================== 排行榜 ====================
const LB_KEY = 'rogue2048_leaderboard';
const API_BASE = window.location.origin + '/api/leaderboard';
let serverAvailable = false;

// 检测服务器是否可用（启动时检测一次）
async function checkServer() {
  try {
    const resp = await fetch(API_BASE, { method: 'GET', signal: AbortSignal.timeout(2000) });
    if (resp.ok) {
      serverAvailable = true;
      console.log('排行榜：使用服务器模式');
    }
  } catch(e) {
    serverAvailable = false;
    console.log('排行榜：使用本地存储模式');
  }
}

function getLocalLB() {
  try {
    const raw = localStorage.getItem(LB_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveLocalLB(lb) {
  try { localStorage.setItem(LB_KEY, JSON.stringify(lb)); } catch(e) {}
}

async function getLeaderboard() {
  if (serverAvailable) {
    try {
      const resp = await fetch(API_BASE, { signal: AbortSignal.timeout(3000) });
      if (resp.ok) {
        const data = await resp.json();
        return data.leaderboard || [];
      }
    } catch(e) { serverAvailable = false; }
  }
  return getLocalLB();
}

async function addToLeaderboard(name, sc, moves, r, c) {
  const entry = {
    name: name.substring(0, 8),
    score: sc,
    moves: moves,
    board: `${r}×${c}`,
  };

  if (serverAvailable) {
    try {
      const resp = await fetch(API_BASE, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entry),
        signal: AbortSignal.timeout(3000),
      });
      if (resp.ok) {
        const data = await resp.json();
        return data.leaderboard || [];
      }
    } catch(e) { serverAvailable = false; }
  }

  // 回退到本地存储
  const lb = getLocalLB();
  lb.push({ ...entry, date: new Date().toLocaleDateString('zh-CN') });
  lb.sort((a, b) => b.score - a.score);
  const top10 = lb.slice(0, 10);
  saveLocalLB(top10);
  return top10;
}

function renderLeaderboardTable(lb, highlightScore) {
  if (lb.length === 0) return '<div class="lb-empty">暂无记录</div>';
  const rankEmoji = ['🥇','🥈','🥉'];
  const rows = lb.map((entry, i) => {
    const rank = i < 3 ? rankEmoji[i] : `#${i + 1}`;
    const isHighlight = highlightScore >= 0 && entry.score === highlightScore;
    const style = isHighlight ? 'background:#e9456022;border-radius:6px' : '';
    return `<tr style="${style}">
      <td class="rank">${rank}</td>
      <td class="lb-name">${escHtml(entry.name)}</td>
      <td class="lb-score">${(entry.score||0).toLocaleString()}</td>
      <td class="lb-info">${entry.board||'?×?'} / ${entry.moves||0}步</td>
    </tr>`;
  }).join('');
  return `<table class="leaderboard-table">
    <tr><th>#</th><th>玩家</th><th>分数</th><th>信息</th></tr>
    ${rows}
  </table>`;
}

async function showLeaderboard() {
  if (overlay.classList.contains('active')) return;
  const lb = await getLeaderboard();
  const modeText = serverAvailable ? '🌐 联网排行榜' : '💻 本地排行榜';
  const html = `
    <h2>🏆 排行榜</h2>
    <div class="subtitle">${modeText}</div>
    ${renderLeaderboardTable(lb, -1)}
    <button class="btn secondary" onclick="hidePopup()">关闭</button>
  `;
  showPopup(html);
}

function escHtml(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

// 百步里程碑：额外 Buff 选择
function showMilestoneBuffSelect() {
  const available = ALL_BUFFS.filter(b => !activeBuffs.some(ab => ab.id === b.id));
  if (available.length === 0) return;
  const options = pickRandom(available, Math.min(3, available.length));
  const html = `
    <h2>🎯 第 ${moveCount} 步里程碑！</h2>
    <div class="subtitle">获得一次额外 Buff 选择</div>
    <div class="cards">
      ${options.map(b => `
        <div class="card" onclick="selectMilestoneBuff('${b.id}')">
          <div class="card-icon" style="background:${b.color}22;border:2px solid ${b.color}44">${b.icon}</div>
          <div class="card-info">
            <div class="card-name" style="color:${b.color}">${b.name}</div>
            <div class="card-desc">${b.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
  `;
  showPopup(html);
}

function selectMilestoneBuff(id) {
  const buff = ALL_BUFFS.find(b => b.id === id);
  activeBuffs.push({...buff, used: false});
  // 强势开局：中局获取时立即生成512和256
  if (id === 'big_start') {
    const empty = getEmptyCells();
    if (empty.length >= 2) {
      const p1 = empty.splice(randInt(empty.length), 1)[0];
      const p2 = empty[randInt(empty.length)];
      grid[p1.r][p1.c] = 512;
      grid[p2.r][p2.c] = 256;
    }
  }
  hidePopup();
  updateUI();
  render();
}

// ==================== 游戏流程 ====================
function startGame() {
  initGrid();
  score = 0;
  moveCount = 0;
  activeBonuses = [];
  hasMerged2048ThisTurn = false;
  mergeablePairs = [];
  newTileSpawn = null;
  milestoneReached = new Set();
  mergeCountThisMove = 0;

  if (hasBuff('big_start')) {
    const empty = getEmptyCells();
    if (empty.length >= 2) {
      const p1 = empty.splice(randInt(empty.length), 1)[0];
      grid[p1.r][p1.c] = 512;
      const p2 = empty[randInt(empty.length)];
      grid[p2.r][p2.c] = 256;
    }
  } else {
    spawnTile();
    spawnTile();
  }

  phase = 'playing';
  resizeCanvas();
  hintText.textContent = hasBuff('manual_merge') ? '方向键滑动（手动合成模式）' : '方向键滑动';
  render();
  updateUI();
  saveGame();
}

function restartGame() {
  activeBuffs = [];
  activeBonuses = [];
  rows = 4;
  cols = 4;
  hidePopup();
  resizeCanvas();
  phase = 'buff_select';
  showBuffSelect();
}

// ==================== 存档系统 ====================
const SAVE_KEY = 'rogue2048_save';

function saveGame() {
  if (phase === 'buff_select' || phase === 'game_over') return;
  const data = {
    grid, rows, cols, score, moveCount,
    activeBuffs: activeBuffs.map(b => ({ id: b.id, used: b.used || false })),
    activeBonuses: activeBonuses.map(b => ({ id: b.id })),
    savedAt: Date.now(),
  };
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(data)); } catch(e) {}
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return null;
    const data = JSON.parse(raw);
    // 恢复 buff/bonus 完整数据
    data.activeBuffs = data.activeBuffs.map(s => {
      const full = ALL_BUFFS.find(b => b.id === s.id);
      return full ? { ...full, used: s.used } : null;
    }).filter(Boolean);
    data.activeBonuses = data.activeBonuses.map(s => {
      const full = ALL_BONUSES.find(b => b.id === s.id);
      return full ? { ...full } : null;
    }).filter(Boolean);
    return data;
  } catch(e) { return null; }
}

function clearSave() {
  try { localStorage.removeItem(SAVE_KEY); } catch(e) {}
}

function hasSave() {
  try { return !!localStorage.getItem(SAVE_KEY); } catch(e) { return false; }
}

// ==================== 输入处理 ====================
function handleMove(dir) {
  if (phase === 'bonus_select' || phase === 'expand_select' || phase === 'game_over' || phase === 'buff_select') return;

  const { changed } = moveGrid(dir);
  if (!changed) return;

  render();
  updateUI();

  // 手动合并模式：等待玩家点击合并
  if (phase === 'merge_select') return;

  // 如果有弹出层（里程碑等），跳过后续检查
  if (overlay.classList.contains('active')) return;

  // 自动合成模式：检查2048奖励和游戏结束
  saveGame();
  if (hasMerged2048ThisTurn) {
    showBonusSelect();
    return;
  }
  if (checkGameOver()) {
    showGameOver();
  }
}

// 键盘输入
document.addEventListener('keydown', e => {
  if (overlay.classList.contains('active')) return;
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': e.preventDefault(); handleMove(0); break;
    case 'ArrowRight': case 'd': case 'D': e.preventDefault(); handleMove(1); break;
    case 'ArrowDown': case 's': case 'S': e.preventDefault(); handleMove(2); break;
    case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); handleMove(3); break;
  }
});

// 触屏滑动
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (overlay.classList.contains('active')) return;

  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  const minSwipe = 30;

  if (Math.max(absDx, absDy) < minSwipe) {
    // 可能是点击，检查方块点击
    handleTap(e.changedTouches[0]);
    return;
  }

  if (absDx > absDy) {
    handleMove(dx > 0 ? 1 : 3); // 右/左
  } else {
    handleMove(dy > 0 ? 2 : 0); // 下/上
  }
});

// 鼠标点击（手动合并、分裂）
canvas.addEventListener('click', e => {
  if (overlay.classList.contains('active')) return;
  handleTap(e);
});

function handleTap(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  // 查找点击的格子
  let clickedR = -1, clickedC = -1;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const x = cellX(c), y = cellY(r);
      if (mx >= x && mx <= x + CELL_SIZE && my >= y && my <= y + CELL_SIZE) {
        clickedR = r;
        clickedC = c;
        break;
      }
    }
    if (clickedR >= 0) break;
  }

  if (clickedR < 0) return;

  // 炸弹引爆
  if (phase === 'playing' && bombGrid[clickedR][clickedC]) {
    explodeBomb(clickedR, clickedC);
    render();
    updateUI();
    if (checkGameOver()) showGameOver();
    return;
  }

  // 分裂模式（加成）
  if (phase === 'playing' && hasBonus('split_master') && grid[clickedR][clickedC] >= 4) {
    if (splitTile(clickedR, clickedC)) {
      render();
      updateUI();
      if (checkGameOver()) showGameOver();
      return;
    }
  }

  // 手动合并模式
  if (phase === 'merge_select') {
    for (const pair of mergeablePairs) {
      if ((clickedR === pair.r1 && clickedC === pair.c1) ||
          (clickedR === pair.r2 && clickedC === pair.c2)) {
        applyManualMerge(pair.r1, pair.c1, pair.r2, pair.c2);
        render();
        updateUI();
        if (mergeablePairs.length === 0) {
          endManualMergeTurn();
          if (checkGameOver()) showGameOver();
        }
        return;
      }
    }
  }
}

// ==================== 动画循环 ====================
let lastFrameTime = 0;
function gameLoop(timestamp) {
  if (!timestamp) timestamp = performance.now();
  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min(timestamp - lastFrameTime, 50);
  lastFrameTime = timestamp;

  // 更新滑动动画
  if (slideAnims.length > 0) {
    let allDone = true;
    for (const a of slideAnims) {
      a.t += dt / SLIDE_DURATION;
      if (a.t < 1) allDone = false;
    }
    if (allDone) slideAnims = [];
  }

  render();
  requestAnimationFrame(gameLoop);
}

// ==================== 启动 ====================
function initGame() {
  const saved = loadGame();
  if (saved) {
    // 恢复存档
    grid = saved.grid;
    rows = saved.rows;
    cols = saved.cols;
    score = saved.score;
    moveCount = saved.moveCount;
    activeBuffs = saved.activeBuffs;
    activeBonuses = saved.activeBonuses;
    hasMerged2048ThisTurn = false;
    mergeablePairs = [];
    newTileSpawn = null;
    milestoneReached = new Set();
    mergeCountThisMove = 0;
    // 从存档恢复时炸弹状态不可恢复，初始化空 bombGrid
    bombGrid = [];
    for (let r = 0; r < rows; r++) bombGrid[r] = new Array(cols).fill(false);
    phase = 'playing';
    resizeCanvas();
    hintText.textContent = hasBuff('manual_merge') ? '方向键滑动（手动合成模式）' : '方向键滑动';
    render();
    updateUI();
  } else {
    resizeCanvas();
    showBuffSelect();
  }
}

resizeCanvas();
checkServer();
initGame();
gameLoop();
</script>
